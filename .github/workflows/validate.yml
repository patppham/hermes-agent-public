name: Validate public runtime

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m unittest discover -s tests -v
      - run: python scripts/validate_public_surface.py
      - run: python -m runtime --input examples/runtime-input.json --now 2026-07-16T12:00:00Z
